name: Release

# Manually-triggered release. Bumps `version` in package.json, renames the
# `## Unreleased` section in CHANGELOG.md to the new version, commits + tags
# back to `main`, then publishes to npm.
#
# Required repository secrets:
#   - NPM_TOKEN: npm automation token with publish access to @basetime/a2w-api-ts.
#
# If `main` is branch-protected such that GITHUB_TOKEN cannot push, create a
# personal access token (or GitHub App token) with bypass permissions, store it
# as the `RELEASE_TOKEN` secret, and replace `secrets.GITHUB_TOKEN` in the
# checkout step below with `secrets.RELEASE_TOKEN`.

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "semver bump"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write # required for `npm publish --provenance`

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # TODO: re-enable once the mocha + ts-node ESM loader setup is fixed.
      # The test files in tests/ are tracked in git but the test runner has
      # been broken for a while (see AGENTS.md > "Tests"). Skipping in CI so
      # releases aren't blocked.
      # - name: Run tests
      #   run: pnpm test

      - name: Bump version
        run: |
          set -euo pipefail
          VERSION=$(pnpm version "${{ inputs.release_type }}" --no-git-tag-version | tail -n1 | sed 's/^v//')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Bumped to $VERSION"

      - name: Update CHANGELOG.md for release
        if: env.VERSION != ''
        run: |
          set -euo pipefail
          python3 - "$VERSION" "$(date -u +%Y-%m-%d)" <<'PY'
          import re
          import sys
          import pathlib

          version, date_iso = sys.argv[1], sys.argv[2]
          path = pathlib.Path("CHANGELOG.md")
          if not path.exists():
              print("::warning::CHANGELOG.md not found; skipping changelog rename.")
              sys.exit(0)

          text = path.read_text()
          match = re.search(r"^## Unreleased\s*\n(.*?)(?=^## |\Z)", text, flags=re.S | re.M)
          if not match or not match.group(1).strip():
              print("::warning::No Unreleased content; skipping changelog rename.")
              sys.exit(0)

          body = match.group(1).strip("\n")
          replacement = f"## Unreleased\n\n## {version} - {date_iso}\n\n{body}\n"
          new_text = re.sub(
              r"^## Unreleased\s*\n.*?(?=^## |\Z)",
              replacement + "\n",
              text,
              count=1,
              flags=re.S | re.M,
          )
          path.write_text(new_text)
          PY

      - name: Commit, tag, and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # The release commit subject starts with `chore(changelog)` and the
          # commit touches CHANGELOG.md, so the local post-commit hook bails on
          # either guard if a maintainer ever pulls and checks out this commit.
          git add package.json CHANGELOG.md
          git commit -m "chore(changelog): release v${VERSION} [skip ci]"
          # Annotated tag (-a) so `git push --follow-tags` actually pushes it;
          # lightweight tags are not pushed by --follow-tags.
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin HEAD:main --follow-tags

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --no-git-checks --provenance

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "v${VERSION}" --generate-notes --title "v${VERSION}"
